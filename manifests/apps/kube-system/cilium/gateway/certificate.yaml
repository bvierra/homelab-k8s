apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-k8s
  namespace: kube-system
spec:
  secretName: wildcard-k8s-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-stage
  commonName: "k8s.${DOMAIN_0}"
  dnsNames:
    - "k8s.${DOMAIN_0}"
    - "*.k8s.${DOMAIN_0}"
