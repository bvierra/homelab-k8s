---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name external-dns
  namespace: &ns kube-system
spec:
  interval: 1h
  timeout: 30m
  chart:
    spec:
      chart: *name
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: *name
        namespace: *ns
      interval: 5m
  releaseName: *name
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: external-dns-values
  targetNamespace: *ns
