---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name kustomize-mutating-webhook
  namespace: &ns flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  path: ./manifests/apps/flux-system/kustomize-mutating-webhook/app/
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: *ns
  dependsOn:
    - name: cert-manager-crds
      namespace: cert-manager
