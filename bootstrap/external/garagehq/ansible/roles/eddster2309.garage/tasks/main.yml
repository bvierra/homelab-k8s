- name: Validate Garage configuration
  ansible.builtin.include_tasks:
    file: validate_config.yml

- name: Configure firewall
  ansible.builtin.include_tasks:
    file: configure_firewall.yml
  when: ansible_os_family == 'RedHat'

- name: Check garage version
  ansible.builtin.include_tasks:
    file: check_garage_version.yml

- name: Upgrade Garage
  ansible.builtin.import_tasks: install_garage.yml
  when: current_garage_version is defined and current_garage_version is version(garage_version, '<')
  throttle: 1

- name: Install Garage
  ansible.builtin.include_tasks: install_garage.yml
  when: current_garage_version is not defined or not (current_garage_version is defined and current_garage_version == garage_version)

- name: Configure Garage
  ansible.builtin.include_tasks:
    file: configure_garage.yml

- name: Install nginx
  ansible.builtin.include_tasks:
    file: nginx.yml
  when: garage_nginx_enabled

- name: DEBUG | keepalived
  ansible.builtin.debug:
    var: garage_keepalived_enabled

- name: Install keepalived
  ansible.builtin.import_role:
    name: evrardjp.keepalived
  when: garage_keepalived_enabled and ansible_play_hosts | length > 1

- name: Create Garage buckets
  ansible.builtin.include_tasks:
    file: create_bucket.yml
  run_once: true
  vars:
    bucket: "{{ item }}"
  loop: "{{ garage_buckets | default([]) }}"
  when: garage_buckets is defined and garage_buckets | length > 0

- name: Create Garage keys
  ansible.builtin.include_tasks:
    file: create_key.yml
  run_once: true
  loop_control:
    label: "{{ key.name }}"
    loop_var: key
  loop: "{{ garage_keys | default([]) }}"
  when: garage_keys is defined and garage_keys | length > 0
