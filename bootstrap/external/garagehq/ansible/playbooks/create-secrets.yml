- name: Login to external secrets server
  hosts: controllers
  gather_facts: false
  tasks:
    - name: Login to external secrets server
      ansible.builtin.include_tasks:
        file: ../tasks/external_secrets.yml

- name: Verify and create all required passwords
  hosts: controllers
  gather_facts: false
  tasks:
    - name: Verify and create all required passwords
      ansible.builtin.include_tasks:
        file: ../tasks/generate_garage_secret.yml
      loop:
        - ES_KEY: "KEY_ID"
          val_prefix: "GK"
          length: 12
          type: hex
        - ES_KEY: "KEY_SECRET"
          length: 32
          type: hex
        - ES_KEY: "RPC_SECRET"
          length: 32
          type: hex
        - ES_KEY: "ADMIN_TOKEN"
          length: 32
          type: base64
        - ES_KEY: "METRICS_TOKEN"
          length: 32
          type: base64
