####################################################################################################################################################################
# This task file is responsible for generating and saving secrets to the External Secret Store (Infisical in this case).
# It will attempt to create the secret first, and if it fails (because the secret already exists), it will update the secret instead.
# The secret will be saved at the path:
# {{ infisical_path }}/{{ ES_KEY }}
####################################################################################################################################################################
# This task expects the following variables to be defined:
# ES_KEY:     The key for the secret in the External Secret Store, capitalized (e.g. GARAGE_RPC_SECRET)
# val_prefix: An optional prefix to add to the generated secret value before saving it to the External Secret Store.
#             This can be used to add a fixed string to the beginning of the secret value (e.g. "GK" for KEY_SECRET secrets).
#             If this variable is not defined or is set to null, no prefix will be added to the secret value.
# val_length: The length of the random value to generate for the secret. This should be a positive integer.
# val_type:   The type of random value to generate. This should be one of the following:
#             - hex: Generates a random hexadecimal string.
#                    The length of the resulting string will be twice the value of val_length
#                    (e.g. a val_length of 16 will generate a 32-character hexadecimal string).
#             - base64: Generates a random base64-encoded string
####################################################################################################################################################################
# This task uses openssl to generate the random secret value, and the infisical.vault Ansible collection to save the secret to Infisical.
####################################################################################################################################################################

- name: Create secret
  ansible.builtin.shell: openssl rand -{{ item.type }} {{ item.length }}
  register: value

- name: "Saving Secret with prefix to External Secret Store"
  when: item.val_prefix is defined and item.val_prefix is not none
  infisical.vault.create_secret:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ infisical_project_id }}"
    env_slug: "{{ infisical_env_slug }}"
    path: "{{ infisical_path }}"
    secret_name: "{{ item.ES_KEY }}"
    secret_value: "{{ item.val_prefix ~ value.stdout }}"
  register: create_result
  ignore_errors: true
- name: "Updating Secret with prefix in External Secret Store (if secret already exists)"
  when: item.val_prefix is defined and create_result.failed
  infisical.vault.update_secret:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ infisical_project_id }}"
    env_slug: "{{ infisical_env_slug }}"
    path: "{{ infisical_path }}"
    secret_name: "{{ item.ES_KEY }}"
    secret_value: "{{ item.val_prefix ~ value.stdout }}"

- name: "Saving Secret to External Secret Store"
  when: item.val_prefix is not defined or item.val_prefix is none
  infisical.vault.create_secret:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ infisical_project_id }}"
    env_slug: "{{ infisical_env_slug }}"
    path: "{{ infisical_path }}"
    secret_name: "{{ item.ES_KEY }}"
    secret_value: "{{ value.stdout }}"
  register: create_result
  ignore_errors: true
- name: "Updating Secret in External Secret Store (if secret already exists))"
  when: item.val_prefix is not defined and create_result.failed
  infisical.vault.update_secret:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ infisical_project_id }}"
    env_slug: "{{ infisical_env_slug }}"
    path: "{{ infisical_path }}"
    secret_name: "{{ item.ES_KEY }}"
    secret_value: "{{ value.stdout }}"
